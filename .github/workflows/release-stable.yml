name: Release Stable

on:
  workflow_dispatch:

concurrency:
  group: folderview-plus-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Use -X theirs so beta wins on conflicts (plg, archive, changelog)
      # since we rebuild plg/archive and fix changelog headers afterward anyway
      - name: Merge beta into main
        run: |
          git merge origin/beta -X theirs -m "Merge beta into main for stable release"

      # MUST run before build — beta .txz files from beta trigger the
      # collision detection in pkg_build.sh, appending .N to the version
      - name: Remove beta packages from archive
        run: |
          rm -f archive/folderview.plus-*-beta*.txz
          echo "Cleaned up beta packages before build"

      # pkg_build.sh with no flags: stable YYYY.MM.DD version, URLs → main
      # This overwrites whatever beta version/URLs the merge brought in
      - name: Build stable package
        run: |
          chmod +x pkg_build.sh
          bash pkg_build.sh

      - name: Ensure CHANGES entry for release version
        run: |
          chmod +x scripts/ensure_plg_changes_entry.sh
          bash scripts/ensure_plg_changes_entry.sh

      - name: Run release guard
        run: |
          chmod +x scripts/release_guard.sh
          bash scripts/release_guard.sh

      - name: Run install smoke checks
        run: |
          chmod +x scripts/install_smoke.sh
          bash scripts/install_smoke.sh

      - name: Standards guard checks
        env:
          FVPLUS_UNRAID_MATRIX: ${{ secrets.FVPLUS_UNRAID_MATRIX }}
          FVPLUS_UNRAID_MATRIX_REQUIRED: '1'
          FVPLUS_UNRAID_REQUIRED_VERSIONS: '7.0.x,7.1.x,7.2.x'
          FVPLUS_UNRAID_REQUIRED_THEMES: 'black,white'
          FVPLUS_I18N_STRICT: '1'
          FVPLUS_REQUIRE_PERF_BASELINE: '1'
        run: |
          chmod +x scripts/api_contract_guard.sh scripts/legacy_support_guard.sh scripts/i18n_guard.sh scripts/lang_usage_guard.sh scripts/theme_scope_guard.sh scripts/perf_budget_guard.sh scripts/repro_build_guard.sh scripts/unraid_matrix_smoke.sh
          bash scripts/api_contract_guard.sh
          bash scripts/legacy_support_guard.sh
          bash scripts/i18n_guard.sh
          bash scripts/lang_usage_guard.sh
          bash scripts/theme_scope_guard.sh
          bash scripts/perf_budget_guard.sh
          bash scripts/repro_build_guard.sh
          bash scripts/unraid_matrix_smoke.sh

      - name: Browser smoke checks (required on release)
        env:
          FVPLUS_BROWSER_SMOKE_URL: ${{ secrets.FVPLUS_BROWSER_SMOKE_URL }}
          FVPLUS_BROWSER_SMOKE_REQUIRED: '1'
          FVPLUS_BROWSER_SMOKE_TIMEOUT_MS: '90000'
          FVPLUS_BROWSER_SMOKE_IGNORE_HTTPS: '1'
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium firefox webkit
          chmod +x scripts/browser_smoke.sh
          bash scripts/browser_smoke.sh

      - name: Optional theme matrix smoke checks
        env:
          FVPLUS_THEME_MATRIX_URLS: ${{ secrets.FVPLUS_THEME_MATRIX_URLS }}
          FVPLUS_THEME_REQUIRED_LABELS: 'black,white'
          FVPLUS_THEME_SMOKE_TIMEOUT_MS: '90000'
          FVPLUS_THEME_SMOKE_IGNORE_HTTPS: '1'
          FVPLUS_THEME_SMOKE_BROWSERS: 'chromium,firefox,webkit'
          FVPLUS_THEME_SMOKE_ZOOMS: '1,1.25,1.5'
        run: |
          if [ -z "${FVPLUS_THEME_MATRIX_URLS:-}" ]; then
            echo "Skipping theme matrix smoke checks (FVPLUS_THEME_MATRIX_URLS not configured)."
            exit 0
          fi
          npm install --no-save playwright
          npx playwright install --with-deps chromium firefox webkit
          chmod +x scripts/theme_matrix_smoke.sh
          bash scripts/theme_matrix_smoke.sh

      - name: Extract stable version
        id: version
        run: |
          VERSION=$(grep -oP '<!ENTITY version "\K[^"]+' folderview.plus.plg)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          FILENAME="folderview.plus-${VERSION}.txz"
          CHECKSUM_FILENAME="${FILENAME}.sha256"
          if [ ! -f "archive/${CHECKSUM_FILENAME}" ]; then
            echo "ERROR: Missing checksum archive/${CHECKSUM_FILENAME}" >&2
            exit 1
          fi
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "checksum_filename=$CHECKSUM_FILENAME" >> $GITHUB_OUTPUT
          echo "Stable version: $VERSION"

      # Rename beta version headers to stable in both changelog files
      # e.g. "## Version 2026.02.07-beta2" → "## Version 2026.02.07"
      - name: Update changelog — beta headers to stable
        run: |
          STABLE="${{ steps.version.outputs.version }}"

          # CHANGELOG-fixes.md: section headers and quick reference table
          sed -i "s/## Version [0-9]\{4\}\.[0-9]\{2\}\.[0-9]\{2\}-beta[0-9]*/## Version ${STABLE}/" CHANGELOG-fixes.md
          sed -i "s/(Version [0-9]\{4\}\.[0-9]\{2\}\.[0-9]\{2\}-beta[0-9]*)/(Version ${STABLE})/" CHANGELOG-fixes.md

          # folderview.plus.plg: CHANGES section entries
          sed -i "s/###[0-9]\{4\}\.[0-9]\{2\}\.[0-9]\{2\}-beta[0-9]*/###${STABLE}/" folderview.plus.plg

          echo "Updated version headers to $STABLE"

      - name: Commit stable release to main
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No release file changes to commit."
          else
            git commit -m "Release stable version ${{ steps.version.outputs.version }}"
          fi

      - name: Push main
        run: git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## FolderViewPlus v${{ steps.version.outputs.version }}

            Install URL: `https://raw.githubusercontent.com/alexphillips-dev/FolderView-Plus/main/folderview.plus.plg`

            See [CHANGELOG-fixes.md](CHANGELOG-fixes.md) for detailed changes.
          files: |
            archive/${{ steps.version.outputs.filename }}
            archive/${{ steps.version.outputs.checksum_filename }}
          draft: false
          prerelease: false

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-stable-debug-${{ github.run_id }}-${{ github.job }}
          if-no-files-found: ignore
          path: |
            folderview.plus.plg
            folderview.plus.xml
            archive/*.txz
            archive/*.sha256
            CHANGELOG-fixes.md
            release_notes.md
            *.log
            scripts/*.log

