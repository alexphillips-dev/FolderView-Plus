name: Release Beta

on:
  workflow_dispatch:

jobs:
  beta:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout beta
        uses: actions/checkout@v4
        with:
          ref: beta
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next beta number
        id: beta
        run: |
          TODAY=$(date +"%Y.%m.%d")

          # Count existing beta packages for today
          EXISTING=$(ls archive/folderview.plus-${TODAY}-beta*.txz 2>/dev/null | wc -l)

          if [ "$EXISTING" -eq 0 ]; then
            BETA_NUM=""
            VERSION="${TODAY}-beta"
          else
            # Next number: if 1 exists (beta), next is beta2; if 2 exist (beta, beta2), next is beta3, etc.
            NEXT=$((EXISTING + 1))
            BETA_NUM="$NEXT"
            VERSION="${TODAY}-beta${NEXT}"
          fi

          echo "beta_num=$BETA_NUM" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Next beta version: $VERSION"

      - name: Build beta package
        run: |
          chmod +x pkg_build.sh
          if [ -n "${{ steps.beta.outputs.beta_num }}" ]; then
            bash pkg_build.sh --beta ${{ steps.beta.outputs.beta_num }}
          else
            bash pkg_build.sh --beta
          fi

      - name: Ensure CHANGES entry for release version
        run: |
          chmod +x scripts/ensure_plg_changes_entry.sh
          bash scripts/ensure_plg_changes_entry.sh

      - name: Verify build
        run: |
          VERSION="${{ steps.beta.outputs.version }}"
          FILENAME="archive/folderview.plus-${VERSION}.txz"

          if [ ! -f "$FILENAME" ]; then
            echo "ERROR: Expected $FILENAME not found"
            ls -la archive/
            exit 1
          fi

          # Verify plg was updated
          PLG_VERSION=$(grep -oP '<!ENTITY version "\K[^"]+' folderview.plus.plg)
          echo "Package: $FILENAME"
          echo "PLG version: $PLG_VERSION"

          if [ "$PLG_VERSION" != "$VERSION" ]; then
            echo "ERROR: PLG version ($PLG_VERSION) doesn't match expected ($VERSION)"
            exit 1
          fi

      - name: Run release guard
        run: |
          chmod +x scripts/release_guard.sh
          bash scripts/release_guard.sh

      - name: Run install smoke checks
        run: |
          chmod +x scripts/install_smoke.sh
          bash scripts/install_smoke.sh

      - name: Optional browser smoke checks
        if: ${{ secrets.FVPLUS_BROWSER_SMOKE_URL != '' }}
        env:
          FVPLUS_BROWSER_SMOKE_URL: ${{ secrets.FVPLUS_BROWSER_SMOKE_URL }}
          FVPLUS_BROWSER_SMOKE_TIMEOUT_MS: '90000'
          FVPLUS_BROWSER_SMOKE_IGNORE_HTTPS: '1'
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium firefox
          chmod +x scripts/browser_smoke.sh
          bash scripts/browser_smoke.sh

      - name: Commit and push to beta
        run: |
          git add archive/ folderview.plus.plg
          git commit -m "Build beta ${{ steps.beta.outputs.version }}"
          git push origin beta

