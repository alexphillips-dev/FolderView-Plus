name: CI

on:
  push:
    branches:
      - main
      - beta
      - reset-main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint JavaScript syntax
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find src -type f -name "*.js" ! -path "*/scripts/include/*" -print0)
          for f in "${files[@]}"; do
            node --check "$f"
          done

      - name: Lint PHP syntax
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find src -type f -name "*.php" -print0)
          for f in "${files[@]}"; do
            php -l "$f"
          done

      - name: Run mobile guard tests
        run: |
          node --test tests/mobile-touch-support.test.mjs tests/mobile-regression-guard.test.mjs

      - name: Run utility tests
        run: |
          node --test tests/*.mjs

      - name: Release guard checks
        run: |
          chmod +x scripts/release_guard.sh
          bash scripts/release_guard.sh

      - name: Install smoke checks
        run: |
          chmod +x scripts/install_smoke.sh
          bash scripts/install_smoke.sh

      - name: Optional browser smoke checks
        if: ${{ secrets.FVPLUS_BROWSER_SMOKE_URL != '' }}
        env:
          FVPLUS_BROWSER_SMOKE_URL: ${{ secrets.FVPLUS_BROWSER_SMOKE_URL }}
          FVPLUS_BROWSER_SMOKE_TIMEOUT_MS: '90000'
          FVPLUS_BROWSER_SMOKE_IGNORE_HTTPS: '1'
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium firefox
          chmod +x scripts/browser_smoke.sh
          bash scripts/browser_smoke.sh
