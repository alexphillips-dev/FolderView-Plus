name: Support / troubleshooting
description: Get help with install, update visibility, configuration, or usage
title: "[Support]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for setup/help questions. For confirmed bugs, use the Bug report form instead.

  - type: dropdown
    id: help_topic
    attributes:
      label: What do you need help with?
      options:
        - Plugin installation
        - Plugin update not showing
        - Folders not visible
        - Nested folders / tree behavior
        - Setup wizard behavior
        - Import/Export behavior
        - Backup restore behavior
        - Folder ordering
        - Auto-assignment rules
        - Custom icon upload or icon packs
        - Safe mode / conflict banner
        - Mobile/touch layout
        - UI/settings behavior
        - Other
    validations:
      required: true

  - type: input
    id: unraid_version
    attributes:
      label: Unraid version
      placeholder: "e.g. 7.1.4"
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: FolderView Plus version
      placeholder: "e.g. 2026.03.05.4 or unknown"
    validations:
      required: true

  - type: dropdown
    id: install_source
    attributes:
      label: Install source
      options:
        - Community Applications
        - plugin install (main URL)
        - plugin install (commit-specific URL)
        - Local file/manual
        - Unsure
    validations:
      required: true

  - type: input
    id: browser_device
    attributes:
      label: Browser and device
      description: Required for UI, wizard, dashboard, and mobile issues.
      placeholder: "e.g. Chrome 134 on Windows desktop, Safari on iPhone 15"
    validations:
      required: true

  - type: dropdown
    id: theme_context
    attributes:
      label: Theme or custom styling active?
      options:
        - None (stock Unraid theme)
        - Unraid theme engine / custom theme
        - Custom CSS/JS overrides
        - Both theme engine and custom CSS/JS
        - Unsure
    validations:
      required: true

  - type: dropdown
    id: conflict_plugins
    attributes:
      label: Other Folder View plugins installed?
      options:
        - No
        - Yes (FolderView3)
        - Yes (FolderView2)
        - Yes (multiple)
        - Unsure
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What you see now.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: troubleshooting_tried
    attributes:
      label: What you already tried
      description: Include exact commands/steps, hard refresh, reinstall attempts, and import/restore attempts if relevant.
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / console output
      description: Optional terminal output, plugin install output, or browser console logs.
      render: shell
    validations:
      required: false

  - type: textarea
    id: attachments
    attributes:
      label: Attachments (optional but helpful)
      description: Drag and drop screenshots, recordings, export JSON, or diagnostics JSON.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Confirmation
      options:
        - label: I reviewed the README install/update section before filing this support request.
          required: true
